<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Sign-in</title>
  <script src="js/github-oauth-deliver.js"></script>
</head>
<body>
  <p id="status">Completing GitHub sign-in…</p>
  <script>
    (function () {
      const statusEl = document.getElementById('status');
      const params = new URLSearchParams(location.search);
      GithubOAuthDeliver.deliverFromSearchParams();

      if (!params.get('state')) {
        statusEl.textContent = 'Missing OAuth state. You can close this window.';
        return;
      }

      if (params.has('error')) {
        statusEl.textContent = params.get('error_description') || params.get('error') || 'GitHub authorization failed.';
        return;
      }

      if (!params.has('code')) {
        statusEl.textContent = 'GitHub did not return an authorization code. You can close this window.';
        return;
      }

      statusEl.textContent = 'Signed in. This window will close automatically…';
      setTimeout(() => window.close(), 500);
    })();
  </script>
</body>
</html>
